name: engine-live

# Phase 06 wiring (ledger Gap 15; roadmap/06 work item 6): this job runs the
# `@live`-tagged conformance suite — `packages/engine-claude/src/live/
# *.live.test.ts` via `vitest.live.config.ts` — against the real, pinned
# Claude Code engine bundled by the exact-pinned
# `@anthropic-ai/claude-agent-sdk` dependency (engine facts:
# `docs/engine-baseline.md`; accepted range 2.1.207–2.1.210).
#
# Auth: the job needs a `CLAUDE_CODE_OAUTH_TOKEN` repository secret (owner-
# provisioned via `claude setup-token`; adaptation §5.7). The suite's own
# harness refuses to run without auth and rate-limit-guards itself via the
# `rate_limit_event` stream (baseline §8) — it aborts rather than pressing a
# nearly-exhausted subscription window.
#
# Each green run is journaled as a queryable `{engineVersion, runId,
# suiteDigest}` record (consumed by phase 14's `engine-conformance` binding
# gate); the record file is uploaded as a workflow artifact. Phase 10 reuses
# this job for its `@live` plugin-load smoke test; phase 23 reuses it
# wholesale at release.
#
# Trigger stays manual (`workflow_dispatch`): live runs consume the owner's
# subscription and are started deliberately, never as a push side effect.

on:
  workflow_dispatch: {}

jobs:
  engine-live:
    name: engine-live (@live conformance suite vs pinned engine)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install sandbox runtime deps (bubblewrap + socat, baseline §6)
        run: sudo apt-get update && sudo apt-get install -y bubblewrap socat
      - name: Fail fast without auth secret
        run: |
          if [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN repository secret is not configured; the @live suite cannot authenticate. See docs/engine-baseline.md §1."
            exit 1
          fi
      - run: npm ci
      - run: npx tsc -b
      - name: Run @live conformance suite
        env:
          EO_LIVE: "1"
          EO_LIVE_RUN_ID: ${{ github.run_id }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: npm run test:live
      - name: Upload live-run journal record
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: engine-live-run-record
          path: packages/engine-claude/live-run-record.json
          if-no-files-found: error
